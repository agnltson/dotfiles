[hort_town]
bg_0 = #1E1412
bg_1 = #2B1A18
bg_2 = #46312F
bg_3 = #4B3A35

fg_0 = #D5C8AE
fg_1 = #E0D2B8
fg_2 = #F1E8D5
fg_3 = #FAF4E8

red_0 = #8C2E23
red_1 = #B53F2F
red_2 = #D1533E

green_0 = #325F45
green_1 = #3F6E52
green_2 = #59A273

yellow_0 = #A47A28
yellow_1 = #D29B31
yellow_2 = #E4B94C

blue_0 = #2A496B
blue_1 = #35597C
blue_2 = #4F7FB5

magenta_0 = #6F3240
magenta_1 = #8E3F50
magenta_2 = #944356

cyan_0 = #316C67
cyan_1 = #3F8A84
cyan_2 = #56B0A8

purple_0 = #7A3E96
purple_1 = #9A59B6
purple_2 = #B67EC7

[bar/monbarreau]
width = 100%
height = 20pt
radius = 0

; dpi = 96

background = ${hort_town.bg_0}
foreground = ${hort_town.fg_3}

line-size = 3pt

border-size = 4pt
border-color = ${hort_town.bg_0}

padding-left = 0
padding-right = 1

module-margin = 1

separator = 
separator-foreground = ${hort_town.bg_3}

font-0 = "FiraCode Nerd Font:size=13;2"

modules-left = xworkspaces xwindow
modules-center = date
modules-right = xkeyboard pulseaudio battery systray powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${hort_town.red_1}
label-active-underline= ${hort_town.red_1}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${hort_town.red_1}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${hort_town.bg_3}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${hort_town.bg_3}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " VOL "
format-volume-prefix-foreground = ${hort_town.fg_3}
format-volume-prefix-background = ${hort_town.magenta_2}
format-volume = <label-volume>
format-volume-foreground = ${hort_town.bg_0}
format-volume-background = ${hort_town.fg_3}

label-volume = " %percentage%% "

label-muted = muted
label-muted-foreground = ${hort_town.bg_3}

[module/xkeyboard]
type = internal/xkeyboard
format = <label-layout> <label-indicator>

blacklist-0 = num lock

label-layout = %name%
label-layout-foreground = ${hort_towm.fg_0}
label-layout-background = ${hort_towm.green_1}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${hort_towm.fg_0}
label-indicator-background = ${hort_towm.green_1}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${hort_towm.fg_0}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#FAF4E8} ETH¬†%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{B#59A273}%{F#FAF4E8} WIFI %{F-}%{B-}%{F#1E1412}%{B#FAF4E8} %essid% %{B-}%{F-}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{B#3F6E52}%{F#F0C674} ETH %{F-} %{B-}

[module/battery]
type = internal/battery

full-at = 99
low-at = 15

battery = BAT0
adapter = AC

poll-interval = 5

format-discharging-prefix = " BAT "
format-discharging-prefix-background = ${hort_town.cyan_2}
format-discharging-prefix-foreground = ${hort_town.fg_3}
format-charging-prefix = " BAT "
format-charging-prefix-background = ${hort_town.cyan_2}
format-charging-prefix-foreground = ${hort_town.fg_3}
format-full-prefix = " BAT "
format-full-prefix-background = ${hort_town.cyan_2}
format-full-prefix-foreground = ${hort_town.fg_3}

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>

format-charging-background = ${hort_town.yellow_1}
format-charging-foreground = ${hort_town.bg_0}
format-discharging-background = ${hort_town.fg_3}
format-discharging-foreground = ${hort_town.bg_0}
format-full-background = ${hort_town.green_2}
format-full-foreground = ${hort_town.bg_0}

label-charging = " %percentage%% "
label-discharging = " %percentage%% "
label-full = " %percentage%% "

[module/date]
type = internal/date
interval = 1

date-alt = " %H:%M "
date = " %d-%m-%Y %H:%M:%S "

label = %date%
label-foreground = ${hort_town.fg_3}
label-background = ${hort_town.blue_2}

[module/spacer]
type = custom/text
content = " "

[module/powermenu]
type = custom/text
content = " ÔÄĎ  "
click-left = ~/.scripts/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
